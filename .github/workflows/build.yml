name: Build

# Triggered whenever source files that affect the bundle change.
# src/** covers all JS modules:
#   unifi-device-card.js, unifi-device-card-editor.js,
#   helpers.js, model-registry.js, translations.js
# The compiled dist/unifi-device-card.js is committed back so
# HACS can serve it directly from the repository.

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "build.js"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/build.yml"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build dist
        run: npm run build
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Commit dist if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Only stage the compiled bundle – never raw sources or lock file
          git add dist/unifi-device-card.js
          git diff --cached --quiet || git commit -m "build: update dist [skip ci]"
          git push
