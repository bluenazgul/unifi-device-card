name: Codex issue analysis

on:
  issues:
    types:
      - opened
      - edited
      - reopened

permissions:
  contents: read
  issues: read

jobs:
  analyze-issue:
    name: Analyze issue with Codex
    if: ${{ !github.event.issue.pull_request }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout develop
        uses: actions/checkout@v5
        with:
          ref: develop
          fetch-depth: 0

      - name: Create Codex issue analysis prompt
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          mkdir -p .github/codex/runtime
          python3 - <<'PY'
          import os
          from pathlib import Path

          content = """You are analyzing a GitHub issue for the repository bluenazgul/unifi-device-card.

          Repository:
          bluenazgul/unifi-device-card

          Base branch:
          develop

          Issue number:
          #""" + os.environ.get("ISSUE_NUMBER", "") + """

          Issue title:
          """ + os.environ.get("ISSUE_TITLE", "") + """

          Issue URL:
          """ + os.environ.get("ISSUE_URL", "") + """

          Issue author:
          """ + os.environ.get("ISSUE_AUTHOR", "") + """

          Issue body:
          """ + os.environ.get("ISSUE_BODY", "") + """

          Before doing the analysis:
          - Read and follow the repository AGENTS.md file if it exists.
          - If additional AGENTS.md files exist in relevant subdirectories, follow the closest applicable one.
          - Treat AGENTS.md as project guidance.
          - The hard rules in this prompt override AGENTS.md if there is a conflict.

          Task:
          Analyze this GitHub issue for the repository maintainer.

          Return the report in English.

          Required output format:

          ## Issue
          - Number:
          - Title:
          - URL:
          - Author:

          ## Suggested Label
          Choose exactly one:
          - bug
          - enhancement
          - question

          ## Summary
          Briefly summarize what the issue is about.

          ## Reasoning
          Explain why the suggested label fits.

          ## Affected Areas
          List likely affected files, components, or logic areas.

          ## Priority
          Choose exactly one:
          - P0 critical
          - P1 high
          - P2 normal
          - P3 low

          ## Maintainer Recommendation
          Explain what the maintainer should do next.

          ## Codex Cloud Task
          If the suggested label is bug or enhancement, provide a ready-to-copy prompt for Codex Cloud.

          If the suggested label is question, write:
          No Codex Cloud task is suggested for this issue.

          The ready-to-copy Codex Cloud task prompt must include:
          - Repository: bluenazgul/unifi-device-card
          - Base branch: develop
          - Issue number and issue URL
          - Work inside the Codex Cloud task/worktree only.
          - Do not comment on the GitHub issue.
          - Do not edit, close, assign, or label the issue.
          - Do not create a GitHub pull request automatically.
          - Keep changes backwards compatible.
          - Prefer changes in /src.
          - Do not touch /dist unless explicitly requested.
          - Do not touch screenshots unless explicitly requested.
          - Update translations if UI text changes.
          - Update changelog.md only if appropriate.
          - Keep the change small and reviewable.
          - Mention the issue number in the task summary.

          Project-specific guidance:
          - Be careful with UniFi gateway, switch, and access point classification.
          - Be careful with model registry mappings.
          - Be careful with port layout logic.
          - Be careful with PoE and link status detection.
          - Do not regress existing known working devices.
          - Preserve backwards compatibility with existing card configurations.
          - HACS packaging expects the built dist file in releases, but normal source PRs should avoid /dist unless explicitly requested.
          - Do not change public config names unless necessary.
          - Do not change screenshots unless explicitly requested by the maintainer.

          Hard rules:
          - Do not comment on GitHub issues.
          - Do not edit GitHub issues.
          - Do not label GitHub issues.
          - Do not close or reopen GitHub issues.
          - Do not assign users.
          - Do not mention users in issues.
          - Do not create a branch.
          - Do not create a pull request.
          - Do not push anything.
          - Do not modify repository files.
          - Only produce this analysis report.
          """

          Path(".github/codex/runtime/issue-analysis-prompt.md").write_text(content, encoding="utf-8")
          PY

      - name: Run Codex analysis
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex/runtime/issue-analysis-prompt.md
          output-file: codex-issue-analysis.md
          sandbox: read-only
          safety-strategy: drop-sudo

      - name: Add analysis to workflow summary
        if: always()
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          {
            printf '# Codex Issue Analysis\n\n'
            printf -- '- Repository: `%s`\n' "${{ github.repository }}"
            printf -- '- Base branch: `develop`\n'
            printf -- '- Issue: [#%s](%s)\n' "$ISSUE_NUMBER" "$ISSUE_URL"
            printf -- '- Title: %s\n\n' "$ISSUE_TITLE"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ -f codex-issue-analysis.md ]; then
            cat codex-issue-analysis.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Codex did not create an analysis file." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload analysis artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codex-issue-${{ github.event.issue.number }}-analysis
          path: codex-issue-analysis.md
          if-no-files-found: warn
